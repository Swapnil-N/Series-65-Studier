<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Offline study app for NASAA Series 65." />

    <!-- `vite-plugin-pwa` auto-injects <link rel="manifest"> so we do not
         declare it manually here (avoids a duplicate tag in dist/index.html). -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- iOS PWA meta tags -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="S65" />

    <title>Series 65 Studier</title>

    <!-- SPA-on-GitHub-Pages: companion to public/404.html. When a direct
         hit / refresh on a deep URL (e.g. /Series-65-Studier/cards) lands
         on 404.html, that page rewrites the URL into a query string and
         redirects here. This script reverses the rewrite so React Router
         sees the original path. Must run BEFORE main.tsx mounts.
         Pattern: github.com/rafgraph/spa-github-pages -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <!-- Pre-mount appearance bootstrap. Reads a localStorage shadow of the
         user's appearance preferences (written whenever Dexie settings are
         saved) and applies .dark / .high-contrast classes + the
         --font-scale variable before React hydrates. Prevents the one-frame
         light-theme flash for users on dark mode. Silently falls through
         on a fresh install or if localStorage is disabled. -->
    <script>
      (function () {
        try {
          var raw = window.localStorage.getItem("s65-appearance");
          var s = raw ? JSON.parse(raw) : null;
          var wantDark = false;
          if (s && s.darkMode === "dark") wantDark = true;
          else if (!s || s.darkMode === "auto") {
            wantDark =
              typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          var root = document.documentElement;
          if (wantDark) root.classList.add("dark");
          if (s && s.highContrast === true) root.classList.add("high-contrast");
          if (s && typeof s.fontScale === "number" && isFinite(s.fontScale)) {
            root.style.setProperty("--font-scale", String(s.fontScale));
          }
        } catch (_) {
          /* pre-mount appearance is best effort */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
